<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Fund Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            📈 Mutual Fund Dashboard
        </a>
    </div>
</nav>

<div class="container my-4">

    <!-- Summary Cards -->
    <div class="row g-3">

        <div class="col-6 col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Portfolio Value</h6>
                    <h4 id="portfolioValue">₹0</h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Today's Gain</h6>
                    <h4 id="todayGain" class="text-success">₹0</h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Funds</h6>
                    <h4 id="fundCount">0</h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Updated</h6>
                    <h4 id="lastUpdated">--</h4>
                </div>
            </div>
        </div>

    </div>

    <!-- Search Section -->
    <div class="card mt-4">
        <div class="card-body">

            <h4>Add Mutual Fund</h4>

            <div class="input-group mt-3">
                <input
                    type="text"
                    id="searchBox"
                    class="form-control"
                    placeholder="Search mutual fund...">

                <button
                    class="btn btn-primary"
                    id="searchBtn">
                    Search
                </button>
            </div>

            <small class="text-muted">
                Search functionality will be added in v0.2
            </small>

        </div>
    </div>

    <!-- Funds List -->
    <div class="card mt-4">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">
                <h4>Your Funds</h4>

                <button
                    class="btn btn-success"
                    id="refreshBtn">
                    Refresh
                </button>
            </div>

            <hr>

            <div id="fundList">

                <div class="text-center text-muted py-4">
                    No funds added yet.
                </div>

            </div>

        </div>
    </div>

</div>

<script src="js/api.js"></script>
<script src="script.js"></script>

</body>
</html>
